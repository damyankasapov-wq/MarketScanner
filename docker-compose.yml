services:

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: marketscanner
      POSTGRES_USER: ms
      POSTGRES_PASSWORD: ms
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ms -d marketscanner -q"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  scanner:
    build: .
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Override DB_HOST so the scanner reaches the db container by its
      # service name rather than the external hostname in .env
      DB_HOST: db
      HEADLESS: "1"
      # Finnhub free tier connects but streams no US-ETF trades, so drive the
      # scanner from yfinance polling. Set to "auto" to try Finnhub WS first.
      FEED_MODE: yfinance
    ports:
      - "8080:8080"
    volumes:
      # Persist backtest charts and tmp files across restarts
      - scanner_output:/app/output
    restart: unless-stopped

volumes:
  pgdata:
  scanner_output:
